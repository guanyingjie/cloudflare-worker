name = "search-japan-player-by-scraperapi"
main = "src/index.js"
compatibility_date = "2024-12-11"

# Workers Logs
# Docs: https://developers.cloudflare.com/workers/observability/logs/workers-logs/
# Configuration: https://developers.cloudflare.com/workers/observability/logs/workers-logs/#enable-workers-logs
[observability]
enabled = true

# KV 持久缓存 (全球一致，跨部署不丢失)
# 首次使用请先创建: wrangler kv namespace create PLAYER_CACHE
# 然后将返回的 id 填入下方
[[kv_namespaces]]
binding = "PLAYER_CACHE"
id = "9692a74405af43238dd898467f1153fc"

# Uncomment to enable environment-specific deployments
# [env.production]
# name = "search-player-production"
# 
# [env.staging]
# name = "search-player-staging"

